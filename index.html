<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>電子スタフシステム (JR東海風・サイン機能付)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            padding: 10px;
            overflow: hidden;
            user-select: none;
        }
        /* ヘッダー情報 */
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #555;
            padding-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        /* メイン時計 */
        .clock-container {
            text-align: center;
            font-size: 44px;
            font-weight: bold;
            color: #00FF00;
            font-family: monospace;
            margin: 5px 0;
            border: 2px solid #333;
            background: #111;
        }
        /* コントロールエリア */
        .control-container {
            background: #222;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            text-align: center;
        }
        input[type="file"] { color: #fff; margin-bottom: 8px; }
        
        .start-btn {
            background-color: #FF8C00;
            color: black;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            display: none;
        }

        /* 行路表示テーブル */
        .staff-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 18px;
        }
        .staff-table th, .staff-table td {
            border: 1px solid #444;
            padding: 12px 8px;
            text-align: center;
        }
        .staff-table th {
            background-color: #222;
            color: #FFFF00;
            font-size: 14px;
        }
        /* 現在ターゲット行の強調（JR東海風の濃い青） */
        .row-current {
            background-color: #00008B !important;
            color: #FFFFFF;
            font-weight: bold;
        }
        /* 通過・確定済みの行 */
        .row-passed {
            color: #666666;
            background-color: #111111;
        }
        
        /* 操作用：手動サインボタン（運転中でも押しやすい巨大サイズ） */
        .action-container {
            margin-top: 10px;
            display: none; /* 行路開始後に表示 */
        }
        .sign-btn {
            background-color: #FFFF00;
            color: #000000;
            border: 3px solid #FF8C00;
            padding: 15px 0;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255,140,0,0.3);
        }
        .sign-btn:active {
            background-color: #CCCC00;
        }

        /* アナウンスログ表示 */
        .status-bar {
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-left: 5px solid #FF8C00;
            font-size: 14px;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>下り 行路 (手動サイン機能付)</div>
        <div id="gps-status" style="color: red;">GPS: 停止中</div>
    </div>

    <!-- 現在時刻表示 -->
    <div class="clock-container" id="digital-clock">00:00:00</div>

    <!-- コントロールエリア -->
    <div class="control-container" id="control-area">
        <div id="file-pick-section">
            <p style="font-size: 12px; margin-bottom: 5px; color: #ccc;">スタフCSVファイルを選択してください</p>
            <input type="file" id="csv-file" accept=".csv">
        </div>
        <button class="start-btn" id="start-btn">行路開始 (出発定時)</button>
    </div>

    <!-- スタフ画面 -->
    <table class="staff-table">
        <thead>
            <tr>
                <th style="width: 40%;">地点名</th>
                <th style="width: 30%;">予定時刻</th>
                <th style="width: 30%;">種別</th>
            </tr>
        </thead>
        <tbody id="staff-body">
            <tr>
                <td colspan="3" style="color: #888;">行路データが読み込まれていません</td>
            </tr>
        </tbody>
    </table>

    <!-- 大型の「通過サイン」ボタンエリア -->
    <div class="action-container" id="action-area">
        <button class="sign-btn" id="sign-btn">【現在地】通過 / 停車 サイン</button>
    </div>

    <!-- アナウンスガイダンス表示 -->
    <div class="status-bar" id="status-msg">
        CSVファイルを読み込んでください。
    </div>

    <script>
        let rawRouteData = [];
        let routeData = [];
        let currentIndex = 0;
        let isRunning = false;
        const APPROACH_RADIUS = 1.5; // 約50m手前

        // 時計更新
        setInterval(() => {
            const now = new Date();
            document.getElementById('digital-clock').textContent = now.toTimeString().split(' ')[0];
        }, 1000);

        // 音声読み上げ
        function ttsSpeak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 1.1;
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        // CSV読み込み
        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                parseCSV(evt.target.result);
                document.getElementById('file-pick-section').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('status-msg').textContent = "データ受領。出発準備よし。";
                ttsSpeak("ビジネスシステム、起動しました。");
            };
            reader.readAsText(file, "UTF-8");
        });

        function parseCSV(text) {
            const lines = text.split('\n');
            rawRouteData = [];
            for(let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                const cols = lines[i].split(',');
                if(cols.length >= 6) {
                    rawRouteData.push({
                        name: cols[0].trim(), lat: parseFloat(cols[1]), lon: parseFloat(cols[2]),
                        minOffset: parseInt(cols[3]) || 0, secOffset: parseInt(cols[4]) || 0,
                        type: cols[5].trim(), announcement: cols[6] ? cols[6].trim() : "", approached: false
                    });
                }
            }
            renderInitialTable();
        }

        function renderInitialTable() {
            const tbody = document.getElementById('staff-body');
            tbody.innerHTML = '';
            rawRouteData.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${p.name}</td><td>--:--:--</td><td>${p.type}</td>`;
                tbody.appendChild(tr);
            });
        }

        // 行路開始
        document.getElementById('start-btn').addEventListener('click', function() {
            if (rawRouteData.length === 0) return;
            let currentTime = new Date();
            routeData = [];

            rawRouteData.forEach((point) => {
                currentTime.setMinutes(currentTime.getMinutes() + point.minOffset);
                currentTime.setSeconds(currentTime.getSeconds() + point.secOffset);
                routeData.push({ ...point, time: currentTime.toTimeString().split(' ')[0] });
            });

            document.getElementById('control-area').style.display = 'none';
            document.getElementById('action-area').style.display = 'block'; // サインボタンを表示
            isRunning = true;
            
            updateSignButtonText();
            renderTable();
            startGPS();

            const firstPoint = routeData[0];
            document.getElementById('status-msg').textContent = firstPoint.announcement || `${firstPoint.name}を出発。`;
            ttsSpeak(firstPoint.announcement || `${firstPoint.name}を出発。`);
        });

        // サインボタンのテキストを「次のターゲット」に合わせて動的に変える
        function updateSignButtonText() {
            const btn = document.getElementById('sign-btn');
            if (currentIndex < routeData.length) {
                const target = routeData[currentIndex];
                btn.textContent = `【${target.name}】通過 / 停車サイン`;
            } else {
                btn.textContent = "全行程 終了";
                btn.disabled = true;
                btn.style.backgroundColor = "#555";
                btn.style.borderColor = "#333";
                btn.style.color = "#888";
            }
        }

        // 手動サインボタンが押された時の処理（確定処理）
        document.getElementById('sign-btn').addEventListener('click', function() {
            if (!isRunning || currentIndex >= routeData.length) return;
            processPointPass();
        });

        // 通過・停車を確定させる共通ロジック
        function processPointPass() {
            const targetPoint = routeData[currentIndex];
            const msg = `${targetPoint.time}、${targetPoint.name}、${targetPoint.type}。定時。`;
            
            document.getElementById('status-msg').textContent = msg;
            ttsSpeak(targetPoint.announcement || msg);

            currentIndex++;
            updateSignButtonText();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('staff-body');
            tbody.innerHTML = '';
            routeData.forEach((point, index) => {
                const tr = document.createElement('tr');
                if (index < currentIndex) tr.className = 'row-passed';
                else if (index === currentIndex) tr.className = 'row-current';
                tr.innerHTML = `<td>${point.name}</td><td style="font-family: monospace;">${point.time}</td><td>${point.type}</td>`;
                tbody.appendChild(tr);
            });
        }

        function startGPS() {
            if (!navigator.geolocation) return;
            document.getElementById('gps-status').textContent = "GPS: 動作中";
            document.getElementById('gps-status').style.color = "#00FF00";
            navigator.geolocation.watchPosition(successGPS, errorGPS, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        function errorGPS() {
            document.getElementById('gps-status').textContent = "GPS: 信号弱";
            document.getElementById('gps-status').style.color = "orange";
        }

        // GPS自動検知
        function successGPS(position) {
            if (!isRunning || currentIndex >= routeData.length) return;

            const distance = getDistance(position.coords.latitude, position.coords.longitude, routeData[currentIndex].lat, routeData[currentIndex].lon);

            // 接近（自動）
            if (distance <= APPROACH_RADIUS && !routeData[currentIndex].approached) {
                routeData[currentIndex].approached = true;
                const msg = `${routeData[currentIndex].name}接近。`;
                document.getElementById('status-msg').textContent = msg;
                ttsSpeak(msg);
            }

            // 通過・到着（自動）
            if (distance <= 0.015) { 
                processPointPass();
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>
</body>
</html>
