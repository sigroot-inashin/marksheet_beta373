<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>電子スタフシステム (スマホ完全対応版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            overflow: hidden;
            user-select: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #555;
            padding-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        .clock-container {
            text-align: center;
            font-size: 44px;
            font-weight: bold;
            color: #00FF00;
            font-family: monospace;
            margin: 5px 0;
            border: 2px solid #333;
            background: #111;
        }
        .control-container {
            background: #222;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            text-align: center;
        }
        input[type="file"] { color: #fff; margin-bottom: 8px; }
        
        .start-btn {
            background-color: #FF8C00;
            color: black;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            display: none;
        }
        .staff-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 18px;
        }
        .staff-table th, .staff-table td {
            border: 1px solid #444;
            padding: 12px 8px;
            text-align: center;
        }
        .staff-table th {
            background-color: #222;
            color: #FFFF00;
            font-size: 14px;
        }
        .row-current {
            background-color: #00008B !important;
            color: #FFFFFF;
            font-weight: bold;
        }
        .row-passed {
            color: #666666;
            background-color: #111111;
        }
        .action-container {
            margin-top: 10px;
            display: none;
        }
        .sign-btn {
            background-color: #FFFF00;
            color: #000000;
            border: 3px solid #FF8C00;
            padding: 15px 0;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .status-bar {
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-left: 5px solid #FF8C00;
            font-size: 14px;
            min-height: 40px;
        }
    </style>
    <!-- ★ 画面スリープを強制防止する最先端のライブラリ（NoSleep.js）を導入 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
</head>
<body>

    <div class="header">
        <div>下り 行路 (スマホ対応・自動スリープ防止機能内蔵)</div>
        <div id="gps-status" style="color: red;">GPS: 停止中</div>
    </div>

    <div class="clock-container" id="digital-clock">00:00:00</div>

    <div class="control-container" id="control-area">
        <div id="file-pick-section">
            <p style="font-size: 12px; margin-bottom: 5px; color: #ccc;">スタフCSVファイルを選択してください</p>
            <input type="file" id="csv-file" accept=".csv">
        </div>
        <button class="start-btn" id="start-btn">行路開始 (出発定時)</button>
    </div>

    <table class="staff-table">
        <thead>
            <tr>
                <th style="width: 40%;">地点名</th>
                <th style="width: 30%;">予定時刻</th>
                <th style="width: 30%;">種別</th>
            </tr>
        </thead>
        <tbody id="staff-body">
            <tr>
                <td colspan="3" style="color: #888;">行路データが読み込まれていません</td>
            </tr>
        </tbody>
    </table>

    <div class="action-container" id="action-area">
        <button class="sign-btn" id="sign-btn">【現在地】通過 / 停車 サイン</button>
    </div>

    <div class="status-bar" id="status-msg">
        CSVファイルを読み込んでください。
    </div>

    <script>
        let rawRouteData = [];
        let routeData = [];
        let currentIndex = 0;
        let isRunning = false;
        const APPROACH_RADIUS = 0.5; // ★500m手前で接近検知

        // NoSleepオブジェクトの初期化
        const noSleep = new NoSleep();

        // オーディオコンテキストの先出し初期化用
        let audioCtx = null;

        setInterval(() => {
            const now = new Date();
            document.getElementById('digital-clock').textContent = now.toTimeString().split(' ')[0];
        }, 1000);

        // iPhoneのオーディオ制限を解除するためのダミー処理
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            // iPhone特有の音声読み上げミュートを1回喋らせて解除
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(u);
            }
        }

        // 🎵 JR東海風の電子アラーム音
        function playAlarmSound() {
            if (!audioCtx) return;
            // 停止していたら再開
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const times = [0, 0.15, 0.3];
            times.forEach(startTime => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(2000, audioCtx.currentTime + startTime);
                
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + 0.1);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + startTime);
                osc.stop(audioCtx.currentTime + startTime + 0.1);
            });
        }

        // iPhone対応音声読み上げ
        function ttsSpeak(text, withAlarm = false) {
            if ('speechSynthesis' in window) {
                if (withAlarm) {
                    playAlarmSound();
                }
                
                setTimeout(() => {
                    // 読み上げ中の音声を強制停止して次を喋らせる（遅延対策）
                    window.speechSynthesis.cancel();
                    
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 1.15; // JR東海風のキビキビしたテンポ
                    utterance.pitch = 1.0;
                    window.speechSynthesis.speak(utterance);
                }, withAlarm ? 450 : 0);
            }
        }

        // CSV読み込み
        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                parseCSV(evt.target.result);
                document.getElementById('file-pick-section').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('status-msg').textContent = "データ受領。出発準備よし。";
                
                // 初回タップ前の準備としてオーディオを有効化
                initAudio();
            };
            reader.readAsText(file, "UTF-8");
        });

        function parseCSV(text) {
            const lines = text.split('\n');
            rawRouteData = [];
            for(let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                const cols = lines[i].split(',');
                if(cols.length >= 6) {
                    rawRouteData.push({
                        name: cols[0].trim(), lat: parseFloat(cols[1]), lon: parseFloat(cols[2]),
                        minOffset: parseInt(cols[3]) || 0, secOffset: parseInt(cols[4]) || 0,
                        type: cols[5].trim(), announcement: cols[6] ? cols[6].trim() : "", approached: false
                    });
                }
            }
            renderInitialTable();
        }

        function renderInitialTable() {
            const tbody = document.getElementById('staff-body');
            tbody.innerHTML = '';
            rawRouteData.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${p.name}</td><td>--:--:--</td><td>${p.type}</td>`;
                tbody.appendChild(tr);
            });
        }

        // ★ 行路開始ボタン（ここでスマホの全制限を解除する）
        document.getElementById('start-btn').addEventListener('click', function() {
            if (rawRouteData.length === 0) return;

            // 1. iPhoneのサウンド・音声のロックを完全解除
            initAudio();

            // 2. スマホの自動スリープ（画面暗転）をバックグラウンドで強制阻止！
            noSleep.enable();

            let currentTime = new Date();
            routeData = [];

            rawRouteData.forEach((point) => {
                currentTime.setMinutes(currentTime.getMinutes() + point.minOffset);
                currentTime.setSeconds(currentTime.getSeconds() + point.secOffset);
                routeData.push({ ...point, time: currentTime.toTimeString().split(' ')[0] });
            });

            document.getElementById('control-area').style.display = 'none';
            document.getElementById('action-area').style.display = 'block';
            isRunning = true;
            
            updateSignButtonText();
            renderTable();
            startGPS();

            const firstPoint = routeData[0];
            document.getElementById('status-msg').textContent = firstPoint.announcement || `${firstPoint.name}を出発。`;
            ttsSpeak(firstPoint.announcement || `${firstPoint.name}を出発。`, false);
        });

        function updateSignButtonText() {
            const btn = document.getElementById('sign-btn');
            if (currentIndex < routeData.length) {
                const target = routeData[currentIndex];
                btn.textContent = `【${target.name}】通過 / 停車サイン`;
            } else {
                btn.textContent = "全行程 終了";
                btn.disabled = true;
                btn.style.backgroundColor = "#555";
                btn.style.borderColor = "#333";
                btn.style.color = "#888";
                // 全行程終了したらスリープ禁止を解除
                noSleep.disable();
            }
        }

        // 手動サイン
        document.getElementById('sign-btn').addEventListener('click', function() {
            if (!isRunning || currentIndex >= routeData.length) return;
            processPointPass();
        });

        function processPointPass() {
            const targetPoint = routeData[currentIndex];
            const msg = `${targetPoint.time}、${targetPoint.name}、${targetPoint.type}。定時。`;
            
            document.getElementById('status-msg').textContent = msg;
            ttsSpeak(targetPoint.announcement || msg, false);

            currentIndex++;
            updateSignButtonText();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('staff-body');
            tbody.innerHTML = '';
            routeData.forEach((point, index) => {
                const tr = document.createElement('tr');
                if (index < currentIndex) tr.className = 'row-passed';
                else if (index === currentIndex) tr.className = 'row-current';
                tr.innerHTML = `<td>${point.name}</td><td style="font-family: monospace;">${point.time}</td><td>${point.type}</td>`;
                tbody.appendChild(tr);
            });
        }

        function startGPS() {
            if (!navigator.geolocation) return;
            document.getElementById('gps-status').textContent = "GPS: 動作中";
            document.getElementById('gps-status').style.color = "#00FF00";
            // スマホ向けに最高精度のGPS設定を強制
            navigator.geolocation.watchPosition(successGPS, errorGPS, { 
                enableHighAccuracy: true, 
                timeout: 10000, 
                maximumAge: 0 
            });
        }

        function errorGPS() {
            document.getElementById('gps-status').textContent = "GPS: 信号弱";
            document.getElementById('gps-status').style.color = "orange";
        }

        function successGPS(position) {
            if (!isRunning || currentIndex >= routeData.length) return;

            const distance = getDistance(position.coords.latitude, position.coords.longitude, routeData[currentIndex].lat, routeData[currentIndex].lon);

            // 接近判定 (500m手前)
            if (distance <= APPROACH_RADIUS && !routeData[currentIndex].approached) {
                routeData[currentIndex].approached = true;
                const msg = `${routeData[currentIndex].name}接近。`;
                document.getElementById('status-msg').textContent = msg;
                ttsSpeak(msg, true); 
            }

            // 通過・到着判定 (約15m以内)
            if (distance <= 0.015) { 
                processPointPass();
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>
</body>
</html>
