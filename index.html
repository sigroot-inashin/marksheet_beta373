<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>乗務支援システム - INTEROS INTEGRATED MONITOR</title>
<style>
:root {
    --bg-main: #07090e;
    --bg-panel: #11141c;
    --bg-panel-header: #1a1f2c;
    --border-color: #2e3748;
    --border-highlight: #4a576e;
    --neon-green: #00ff66;
    --neon-red: #ff3b30;
    --neon-orange: #ff9f0a;
    --neon-blue: #0080ff;
    --text-primary: #ffffff;
    --text-secondary: #8e9aaf;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%;
    height: 100%;
    background: var(--bg-main); 
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
}

.app-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 6px;
    gap: 6px;
    background: radial-gradient(circle at center, #10141d 0%, #030406 100%);
}

.header {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #1f2535 0%, #131722 100%);
    border: 1px solid var(--border-color);
    padding: 0 16px;
    border-radius: 4px;
    flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.const-label { background: var(--neon-blue); color: #ffffff; font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 3px; }
.train-box { color: var(--neon-green); font-size: 24px; font-weight: 900; font-family: monospace; letter-spacing: 1.5px; }
.header-center { font-size: 15px; font-weight: 700; letter-spacing: 6px; color: #cbd5e1; }
.clock { font-size: 28px; font-weight: 700; font-family: monospace; }

.main-content { 
    flex: 1; 
    display: flex; 
    gap: 6px; 
    overflow: hidden; 
}

/* 左側：電子スタフ */
.staf-container { 
    width: 48%; 
    display: flex; 
    flex-direction: column; 
    background: var(--bg-panel); 
    border: 1px solid var(--border-color); 
    border-radius: 4px;
    overflow: hidden;
}
.staf-header { 
    display: grid; 
    grid-template-columns: 55px 1fr 95px 95px 100px; 
    padding: 10px 6px; 
    background: var(--bg-panel-header); 
    font-size: 11px; 
    color: var(--text-secondary); 
    font-weight: 700; 
    border-bottom: 1px solid var(--border-highlight);
    text-align: center;
}
.staf-header > div:nth-child(2) { text-align: left; padding-left: 12px; }

.staf-scroll-area { flex: 1; overflow-y: auto; background: #0b0d12; }
.staf-row { 
    display: grid; 
    grid-template-columns: 55px 1fr 95px 95px 100px; 
    padding: 12px 6px; 
    align-items: center; 
    border-bottom: 1px solid #161a24; 
    font-size: 15px; 
    font-family: monospace; 
    color: #cbd5e1; 
}
.staf-station { font-weight: 700; color: #ffffff; padding-left: 12px; font-family: sans-serif; font-size: 16px; }

.type-indicator { text-align: center; font-weight: 900; font-size: 11px; padding: 3px 0; border-radius: 3px; width: 42px; margin: 0 auto; }
.type-indicator.stop { background: var(--neon-red); color: #ffffff; }
.type-indicator.pass { background: var(--neon-orange); color: #000000; }
.staf-row.pass-row .staf-station { color: #ffbc42; }

.staf-time { text-align: center; font-weight: 700; color: #ffffff; }
.staf-actual { text-align: center; color: #4a576e; font-weight: 700; }
.staf-diff { text-align: right; font-weight: 700; padding-right: 10px; font-size: 14px; }

.staf-row.active { 
    background: linear-gradient(90deg, #072c1a 0%, #11141c 100%); 
    box-shadow: inset 3px 0 0 var(--neon-green);
}
.staf-row.active .staf-station { color: var(--neon-green) !important; text-shadow: 0 0 8px rgba(0,255,102,0.3); }
.staf-row.active .staf-time { color: var(--neon-green); }
.staf-row.active .staf-actual { color: #ffffff; }

/* 右側：ナビゲーションパネル */
.navi-container { 
    width: 52%; 
    display: flex; 
    flex-direction: column; 
    gap: 6px; 
}
.target-box { 
    height: 110px;
    background: var(--bg-panel); 
    border: 1px solid var(--border-color); 
    border-radius: 4px;
    padding: 14px 20px; 
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.target-label { 
    font-size: 11px; 
    color: var(--neon-green); 
    letter-spacing: 3px; 
    font-weight: 800;
    border-left: 4px solid var(--neon-green);
    padding-left: 8px;
}
.target-main { display: flex; justify-content: space-between; align-items: center; }
.target-name { font-size: 48px; font-weight: 900; color: #ffffff; }
.target-type-frame { border: 2px solid #ffffff; padding: 4px 16px; font-size: 20px; font-weight: 900; border-radius: 3px; }
.target-type-frame.stop { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255,59,48,0.1); }
.target-type-frame.pass { border-color: var(--neon-orange); color: var(--neon-orange); background: rgba(255,159,10,0.1); }

/* 車内案内表示エリア */
.announcement-box {
    flex: 1;
    background: #090b10;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.8);
}
.announcement-label { font-size: 10px; color: var(--neon-blue); font-weight: 800; letter-spacing: 2px; }
.announcement-text { font-size: 16px; font-weight: 700; color: #e2e8f0; line-height: 1.5; word-break: break-all; overflow-y: auto; }

/* 速度計計器 */
.instrument-panel {
    height: 90px;
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
}
.speed-digital { width: 130px; text-align: right; line-height: 0.9; }
.speed-num { font-size: 48px; font-weight: 900; font-family: monospace; color: #ffffff; }
.speed-unit { font-size: 12px; color: var(--text-secondary); font-weight: 700; }

.meter-bar-container { flex: 1; height: 36px; background: #0b0d12; border: 1px solid var(--border-highlight); border-radius: 3px; position: relative; overflow: hidden; }
.meter-bar-container::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 10% 100%; z-index: 1; }
.meter-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #006622 0%, var(--neon-green) 100%); transition: width 0.25s ease; }
.meter-scale-95 { position: absolute; left: 79%; top: 0; bottom: 0; width: 2px; background: var(--neon-red); z-index: 2; }
.meter-scale-label { position: absolute; left: 75%; bottom: 4px; font-size: 10px; color: var(--neon-red); font-weight: 900; z-index: 3; }

.ats-status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.ats-lamp { background: #151922; border: 1px solid #252d3d; border-radius: 3px; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 700; color: #3a4659; }
.ats-lamp.active-green { background: #043818; color: var(--neon-green); border-color: var(--neon-green); }
.ats-lamp.active-orange { background: #3d2403; color: var(--neon-orange); border-color: var(--neon-orange); }

/* 下部コントロール */
.footer-controls { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.status-bar { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 3px; padding: 6px 12px; font-size: 12px; color: var(--text-secondary); font-family: monospace; }
.btn-row { display: flex; gap: 6px; }
.action-btn { flex: 1; height: 52px; border: 1px solid transparent; border-radius: 4px; font-size: 15px; font-weight: 700; cursor: pointer; color: #ffffff; transition: all 0.1s ease; -webkit-tap-highlight-color: transparent; }
.btn-arrival { background: linear-gradient(180deg, #1d4ed8 0%, #1e40af 100%); border-color: #3b82f6; }
.btn-arrival:active { background: #3b82f6; transform: translateY(1px); }
.btn-skip { background: linear-gradient(180deg, #b45309 0%, #78350f 100%); border-color: var(--neon-orange); }
.btn-skip:active { background: var(--neon-orange); color: #000; transform: translateY(1px); }
.btn-announce { background: linear-gradient(180deg, #2e3748 0%, #1a1f2c 100%); border-color: var(--border-highlight); }
.btn-announce:active { background: var(--border-highlight); transform: translateY(1px); }

/* 起動用オーバーレイ画面 */
.init-screen { position: fixed; inset: 0; background: #07090e; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 20px; }
.init-title { font-size: 24px; font-weight: 900; text-align: center; letter-spacing: 3px; line-height: 1.6; }
.init-box-layout { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 380px; }

/* 【修正】文字コードを手動選択できる安全スイッチ */
.encoding-selector {
    display: flex;
    justify-content: space-around;
    background: #11141c;
    padding: 12px;
    border-radius: 4px;
    border: 1px solid var(--border-color);
    font-size: 13px;
    font-weight: 700;
}
.encoding-selector label { cursor: pointer; display: flex; align-items: center; gap: 6px; }

.file-btn { background: #1a1f2c; border: 1px solid var(--border-highlight); color: #ffffff; padding: 18px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; border-radius: 4px; }
.start-active-btn { background: linear-gradient(180deg, #056a28 0%, #03481b 100%); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 18px; font-size: 16px; font-weight: 900; cursor: pointer; text-align: center; border-radius: 4px; display: none; }

@media (max-width: 1024px) {
    .main-content { flex-direction: column; gap: 6px; }
    .navi-container { width: 100%; order: 1; }
    .staf-container { width: 100%; order: 2; flex: 1; min-height: 220px; }
    .target-box { padding: 10px 16px; height: 85px; }
    .target-name { font-size: 36px; }
    .action-btn { height: 46px; font-size: 14px; }
    .staf-header, .staf-row { grid-template-columns: 55px 1fr 85px 85px 90px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-left">
            <span class="const-label">支援有効</span>
            <div class="train-box">1104G</div>
        </div>
        <div class="header-center">INTEROS ADVANCED MONITOR</div>
        <div class="header-right"><div class="clock" id="clock">00:00:00</div></div>
    </div>

    <div class="main-content">
        <div class="staf-container">
            <div class="staf-header">
                <div>種別</div><div>駅名</div><div>定刻(秒)</div><div>実績(秒)</div><div>早晩(秒補正)</div>
            </div>
            <div class="staf-scroll-area" id="stafTable"></div>
        </div>

        <div class="navi-container">
            <div class="target-box">
                <div class="target-label">NEXT STATION TARGET</div>
                <div class="target-main">
                    <div class="target-name" id="nextStation">--</div>
                    <div class="target-type-frame" id="nextTypeBadge">--</div>
                </div>
            </div>

            <div class="announcement-box">
                <div class="announcement-label">INFORMATION DISPLAY</div>
                <div class="announcement-text" id="announcementText">案内放送データがここに表示されます。</div>
            </div>

            <div class="instrument-panel">
                <div class="speed-digital"><div class="speed-num" id="speed">0</div><div class="speed-unit">km/h</div></div>
                <div class="meter-bar-container">
                    <div class="meter-scale-95"></div><div class="meter-scale-label">95</div>
                    <div class="meter-bar-fill" id="speedBar"></div>
                </div>
            </div>

            <div class="ats-status-grid">
                <div class="ats-lamp active-green">ATS-P</div>
                <div class="ats-lamp" id="lampPattern">パターン</div>
                <div class="ats-lamp active-green">B-解放</div>
                <div class="ats-lamp active-green">ドア閉</div>
            </div>
        </div>
    </div>

    <div class="footer-controls">
        <div class="status-bar" id="statusText">SYSTEM READY</div>
        <div class="btn-row">
            <button class="action-btn btn-arrival" id="arrivalBtn">到着 / 進捗更新 (秒単位計測)</button>
            <button class="action-btn btn-skip" id="skipBtn">当駅通過</button>
            <button class="action-btn btn-announce" id="announceBtn">直近放送リピート</button>
        </div>
    </div>
</div>

<div class="init-screen" id="initScreen">
    <div class="init-title">
        乗務支援ナビゲーションシステム<br>
        <span style="color:var(--neon-green); font-size: 14px; font-weight: 800; letter-spacing: 2px;">INTEROS MANAGEMENT SYSTEM</span>
    </div>
    <div class="init-box-layout">
        
        <div class="encoding-selector">
            <label><input type="radio" name="encodingSelect" value="utf-8" checked> UTF-8 (一般的なファイル)</label>
            <label><input type="radio" name="encodingSelect" value="shift-jis"> Shift_JIS (Excel直出力)</label>
        </div>

        <label class="file-btn">
            カスタムスタフCSVファイルを読込
            <input type="file" id="csvFile" accept=".csv" hidden>
        </label>
        <button class="start-active-btn" id="startSystemBtn">運行支援システム 有効化起動</button>
    </div>
</div>

<script>
let routeData = [];
let currentIndex = 0;
let warned2000 = false;
let isFinished = false; 
let startTime = null;
let currentPosition = { lat: 0, lon: 0 };
let availableVoices = [];
let audioCtx = null;
let routeDataRawText = "";

function logStatus(msg) {
    document.getElementById("statusText").textContent = `[SYS_LOG] ${msg}`;
}

function initVoices() {
    if (!("speechSynthesis" in window)) return;
    availableVoices = window.speechSynthesis.getVoices();
}
initVoices();
if ("speechSynthesis" in window) { window.speechSynthesis.onvoiceschanged = initVoices; }

setInterval(() => {
    const now = new Date();
    document.getElementById("clock").textContent = 
        `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}, 250);

// 【修正】指定された文字コードで確実に読み込む処理（自動判別を排除）
document.getElementById("csvFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    
    // ラジオボタンで選ばれているエンコードを取得
    const selectedEncoding = document.querySelector('input[name="encodingSelect"]:checked').value;

    const reader = new FileReader();
    reader.onload = evt => {
        const buffer = evt.target.result;
        const arr = new Uint8Array(buffer);
        
        const decoder = new TextDecoder(selectedEncoding);
        routeDataRawText = decoder.decode(arr);
        
        document.getElementById("startSystemBtn").style.display = "block";
        logStatus(`CSV読込完了（指定方式: ${selectedEncoding.toUpperCase()}）。有効化起動してください。`);
    };
    reader.readAsArrayBuffer(file);
});

document.getElementById("startSystemBtn").addEventListener("click", () => {
    if(!routeDataRawText) return;
    document.getElementById("initScreen").style.display = "none";
    
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    
    try { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); } catch(e){}
    
    startTime = Date.now();
    parseCSV(routeDataRawText);
    recalculatePlannedTimestamps();
    startGPS();
    renderStafTable();
    updateUI();

    if (routeData.length > 0) {
        triggerStationAnnounce(routeData[currentIndex]);
    }
});

function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    routeData = [];
    let totalAccumulatedSeconds = 0;

    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if (cols.length < 6) continue;

        const stationName = cols[0].replace(/^"|"$/g, "").trim();
        let lat = parseFloat(cols[1]) || 0.0;
        let lon = parseFloat(cols[2]) || 0.0;
        const minOffset = parseInt(cols[3]) || 0;
        const secOffset = parseInt(cols[4]) || 0;
        const type = cols[5].replace(/^"|"$/g, "").trim();
        const rawAnnounce = cols[6] ? cols[6].replace(/^"|"$/g, "").trim() : "";

        totalAccumulatedSeconds += (minOffset * 60) + secOffset;
        let jaText = rawAnnounce, enText = "";
        if (rawAnnounce.includes("..")) {
            const parts = rawAnnounce.split("..");
            jaText = parts[0].trim(); enText = parts[1].trim();
        }

        routeData.push({
            station: stationName, lat, lon, accumulatedSeconds: totalAccumulatedSeconds,
            timeStr: "", plannedTimestamp: 0, type, japaneseText: jaText, englishText: enText,
            actualTime: "", diffText: "--", diffColor: "var(--text-secondary)"
        });
    }
}

function recalculatePlannedTimestamps() {
    routeData.forEach(r => {
        const pTime = new Date(startTime + (r.accumulatedSeconds * 1000));
        r.plannedTimestamp = pTime.getTime();
        r.timeStr = `${String(pTime.getHours()).padStart(2,"0")}:${String(pTime.getMinutes()).padStart(2,"0")}:${String(pTime.getSeconds()).padStart(2,"0")}`;
    });
}

function renderStafTable() {
    const table = document.getElementById("stafTable");
    table.innerHTML = ""; 
    routeData.forEach((r, idx) => {
        const row = document.createElement("div");
        row.className = "staf-row";
        if (idx === currentIndex && !isFinished) row.classList.add("active");
        
        const isStop = r.type === "停車";
        if (!isStop) row.classList.add("pass-row");

        row.innerHTML = `
            <div class="type-indicator ${isStop?'stop':'pass'}">${isStop?'停車':'通過'}</div>
            <div class="staf-station">${r.station}</div>
            <div class="staf-time">${r.timeStr}</div>
            <div class="staf-actual">${r.actualTime || "--:--:--"}</div>
            <div class="staf-diff" style="color: ${r.diffColor};">${r.diffText}</div>
        `;
        table.appendChild(row);
    });
    const activeRow = table.querySelector(".active");
    if (activeRow) activeRow.scrollIntoView({ behavior: "smooth", block: "center" });
}

function updateUI() {
    if (isFinished || currentIndex >= routeData.length) {
        document.getElementById("nextStation").textContent = "全行程終了";
        document.getElementById("nextTypeBadge").textContent = "終着";
        document.getElementById("nextTypeBadge").className = "target-type-frame";
        return;
    }

    const target = routeData[currentIndex];
    document.getElementById("nextStation").textContent = target.station;
    
    const badge = document.getElementById("nextTypeBadge");
    badge.textContent = target.type;
    badge.className = target.type === "停車" ? "target-type-frame stop" : "target-type-frame pass";
}

function startGPS() {
    if (!navigator.geolocation) {
        updateSpeedGauge(80);
        return;
    }
    navigator.geolocation.watchPosition(pos => {
        if (isFinished || currentIndex >= routeData.length) return;
        currentPosition.lat = pos.coords.latitude;
        currentPosition.lon = pos.coords.longitude;
        let speedKmh = Math.round((pos.coords.speed || 0) * 3.6);
        updateSpeedGauge(speedKmh < 0 ? 0 : speedKmh);

        const target = routeData[currentIndex];
        if (target.lat === 0 && target.lon === 0) return;
        const dist = calcDistance(currentPosition.lat, currentPosition.lon, target.lat, target.lon);
        if (dist <= 1.5 && !warned2000) {
            warned2000 = true;
            document.getElementById("lampPattern").className = "ats-lamp active-orange";
            playBeepAlarm(2200, 0.15);
            triggerStationAnnounce(target);
        }
    }, () => {}, { enableHighAccuracy: true });
}

function updateSpeedGauge(khm) {
    document.getElementById("speed").textContent = khm;
    let percent = Math.min((khm / 120) * 100, 100); 
    const bar = document.getElementById("speedBar");
    bar.style.width = `${percent}%`;
    bar.style.background = khm > 95 ? "var(--neon-red)" : "linear-gradient(90deg, #006622 0%, var(--neon-green) 100%)";
}

function playClickSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(1800, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.05);
}

function playBeepAlarm(freq, volume) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    [0, 0.12].forEach((d) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, now + d);
        gain.gain.setValueAtTime(volume, now + d);
        gain.gain.exponentialRampToValueAtTime(0.01, now + d + 0.06);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now + d); osc.stop(now + d + 0.06);
    });
}

function triggerStationAnnounce(target) {
    if (!target || isFinished) return;
    
    const displayForm = target.japaneseText + (target.englishText ? " \n " + target.englishText : "");
    document.getElementById("announcementText").innerText = displayForm || "（案内放送データなし）";

    if (!("speechSynthesis" in window)) return;
    try { window.speechSynthesis.cancel(); } catch(e) {}

    if (target.japaneseText) {
        const utterJa = new SpeechSynthesisUtterance(target.japaneseText);
        utterJa.lang = "ja-JP"; utterJa.rate = 1.05;
        const voiceJa = availableVoices.find(v => v.lang.includes("ja"));
        if (voiceJa) utterJa.voice = voiceJa;
        window.speechSynthesis.speak(utterJa);
    }
    if (target.englishText) {
        const utterEn = new SpeechSynthesisUtterance(target.englishText);
        utterEn.lang = "en-US"; utterEn.rate = 0.95;
        let voiceEn = availableVoices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("google"));
        if (!voiceEn) voiceEn = availableVoices.find(v => v.lang.startsWith("en"));
        if (voiceEn) utterEn.voice = voiceEn;
        window.speechSynthesis.speak(utterEn);
    }
}

function processManualEvent() {
    if (isFinished || routeData.length === 0 || currentIndex >= routeData.length) return;
    
    playClickSound();

    const target = routeData[currentIndex];
    const now = new Date();
    
    target.actualTime = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
    const diffSec = Math.round((now.getTime() - target.plannedTimestamp) / 1000);
    
    if (Math.abs(diffSec) <= 5) {
        target.diffText = "定時 ±0秒"; target.diffColor = "var(--neon-green)";
    } else if (diffSec > 0) {
        const m = Math.floor(diffSec / 60); const s = diffSec % 60;
        target.diffText = `延着 ${m > 0 ? m + '分' : ''}${s}秒`; target.diffColor = "var(--neon-red)";
    } else {
        const absSec = Math.abs(diffSec);
        const m = Math.floor(absSec / 60); const s = absSec % 60;
        target.diffText = `早着 ${m > 0 ? m + '分' : ''}${s}秒`; target.diffColor = "var(--neon-green)";
    }

    if (currentIndex === routeData.length - 1) {
        isFinished = true;
        renderStafTable(); updateUI();
        document.getElementById("announcementText").innerText = "全行程の運転が終了しました。お疲れ様でした。";
        logStatus("全行程終了。お疲れ様でした。");
        try { window.speechSynthesis.speak(new SpeechSynthesisUtterance("全行程の運転が終了しました。お疲れ様でした。")); } catch(e){}
        return;
    }

    currentIndex++;
    warned2000 = false;
    document.getElementById("lampPattern").className = "ats-lamp";
    renderStafTable(); updateUI();
    
    if (currentIndex < routeData.length) {
        triggerStationAnnounce(routeData[currentIndex]);
    }
}

document.getElementById("arrivalBtn").addEventListener("click", processManualEvent);
document.getElementById("skipBtn").addEventListener("click", processManualEvent);
document.getElementById("announceBtn").addEventListener("click", () => {
    playClickSound();
    if (!isFinished && routeData.length > 0) { triggerStationAnnounce(routeData[currentIndex]); }
});

function calcDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
