<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>乗務員支援システム - DIGITAL TRAIN DIAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Changa+One&family=Noto+Sans+JP:wght=700;900&display=swap');

:root {
    --bg-base: #000000;       
    --bg-card: #111111;       
    --bg-header: #222222;     
    --border-flat: #2a2a2a;   
    
    --rail-white: #ffffff;
    --rail-green: #00ff66;    
    --rail-yellow: #ffcc00;   
    --rail-red: #ff3333;      
    --text-muted: #555555;    
    
    --color-special-rapid: #F08200;   
    --color-rapid: #FFD700;           
    --color-commuter-rapid: #9ACD32;  
    --color-new-rapid: #191970;      
    --color-local: #00A65A;           
    --color-ltd-exp: #00B2E5;         
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%;
    height: 100%;
    background: var(--bg-base); 
    color: var(--rail-white);
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
}

.app-wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 6px;
    gap: 6px;
}

.top-bar {
    height: 44px;
    background: var(--bg-card);
    border: 1px solid var(--border-flat);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    border-radius: 2px;
}
.train-meta { display: flex; align-items: center; gap: 12px; }
.status-badge { background: #0054a6; color: #fff; font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 1px; }
.train-id { font-family: 'Consolas', monospace; font-size: 22px; font-weight: 900; color: var(--rail-green); }
.system-title { font-size: 12px; font-weight: 900; color: var(--text-muted); letter-spacing: 2px; }
.live-clock { font-family: 'Consolas', monospace; font-size: 24px; font-weight: bold; color: var(--rail-white); }

.main-grid {
    flex: 1;
    display: flex;
    gap: 6px;
    overflow: hidden;
}

.staf-panel {
    width: 53%;
    background: var(--bg-card);
    border: 1px solid var(--border-flat);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.staf-thead {
    display: grid;
    grid-template-columns: 100px 65px 1fr 75px 75px 80px 55px;
    background: var(--bg-header);
    padding: 6px 4px;
    font-size: 11px;
    color: #aaa;
    font-weight: 900;
    text-align: center;
    border-bottom: 1px solid var(--border-flat);
}
.staf-thead > div:nth-child(3) { text-align: left; padding-left: 12px; }

.staf-tbody { flex: 1; overflow-y: auto; background: #050505; }
.staf-row {
    display: grid;
    grid-template-columns: 100px 65px 1fr 75px 75px 80px 55px;
    padding: 4px 4px;
    align-items: center;
    border-bottom: 1px solid #151515;
    height: 52px;
    transition: all 0.2s ease;
}
.staf-station-name { font-size: 17px; font-weight: 900; color: var(--rail-white); padding-left: 12px; }
.staf-time-cell { text-align: center; font-family: 'Consolas', monospace; font-size: 14px; color: #ffffff; }
.staf-actual-cell { text-align: center; font-family: 'Consolas', monospace; font-size: 14px; color: #444; }
.staf-diff-cell { text-align: right; font-family: 'Consolas', monospace; font-size: 13px; font-weight: 700; padding-right: 8px; }

.status-led-badge {
    font-size: 11px;
    font-weight: 900;
    text-align: center;
    padding: 3px 0;
    border-radius: 2px;
    letter-spacing: 1px;
    line-height: 1;
}
.status-led-badge.stop {
    background: rgba(0, 255, 102, 0.15);
    color: var(--rail-green);
    border: 1px solid rgba(0, 255, 102, 0.4);
}
.status-led-badge.pass {
    background: rgba(241, 90, 36, 0.1);
    color: #f15a24;
    border: 1px solid rgba(241, 90, 36, 0.3);
}

.staf-row.active {
    background: #061f0e !important;
    box-shadow: inset 4px 0 0 var(--rail-green);
    opacity: 1.0 !important;
}
.staf-row.active .staf-station-name { color: var(--rail-green); }
.staf-row.active:not(.is-pass-station) .staf-time-cell { color: var(--rail-green); font-weight: 700; }

.staf-row.is-pass-station {
    background: #040404;
    opacity: 0.4;
}
.staf-row.is-pass-station .staf-station-name { color: #555555; font-weight: 700; }
.staf-row.is-pass-station .staf-time-cell { 
    color: #443c28; 
    font-size: 16px; 
    font-weight: 900;
}

.control-panel {
    width: 47%;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.next-target-card {
    background: var(--bg-card);
    border: 1px solid var(--border-flat);
    border-radius: 2px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.card-label { font-size: 10px; color: var(--rail-green); font-weight: 900; letter-spacing: 1px; }
.target-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.target-station-display { font-size: 42px; font-weight: 900; color: var(--rail-white); flex: 1; }

.jr-sign-container {
    display: flex;
    flex-direction: column;
    background: #000000;
    border: 1px solid #333333;
    overflow: hidden;
    position: relative;
}
.jr-sign-top { display: flex; align-items: center; background: #000000; flex: 1; }
.jr-sign-symbol {
    color: #ffffff; font-weight: 900; font-family: 'Arial', sans-serif;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.jr-sign-jp-box { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
.jr-sign-jp {
    font-weight: 900; font-family: 'Noto Sans JP', sans-serif;
    display: inline-block; transform: skewX(-13deg); line-height: 1; white-space: nowrap; text-align: center;
}
.jr-sign-en {
    color: #ffffff; font-family: 'Arial', sans-serif; font-weight: 700; text-align: center;
    white-space: nowrap; display: flex; align-items: center; justify-content: center;
}

.jr-sign-container.large { width: 210px; height: 72px; border-radius: 2px; }
.jr-sign-container.large .jr-sign-symbol { width: 44px; height: 48px; font-size: 32px; }
.jr-sign-container.large .jr-sign-jp { font-size: 32px; letter-spacing: -1px; }
.jr-sign-container.large .jr-sign-en { height: 20px; font-size: 11px; }

.jr-sign-container.small { width: 92px; height: 36px; border-radius: 1px; }
.jr-sign-container.small .jr-sign-symbol { width: 22px; height: 24px; font-size: 15px; }
.jr-sign-container.small .jr-sign-jp { font-size: 15px; letter-spacing: -0.5px; }
.jr-sign-container.small .jr-sign-en { height: 10px; font-size: 6.5px; font-weight: 900; }

.theme-special-rapid { --jr-color: var(--color-special-rapid); }
.theme-rapid { --jr-color: var(--color-rapid); }
.theme-commuter-rapid { --jr-color: var(--color-commuter-rapid); }
.theme-new-rapid { --jr-color: var(--color-new-rapid); }
.theme-local { --jr-color: var(--color-local); }
.theme-ltd-exp { --jr-color: var(--color-ltd-exp); }
.theme-terminal { --jr-color: #333333; }

.jr-sign-symbol { background: var(--jr-color); }
.jr-sign-jp { color: var(--jr-color); }
.jr-sign-en { background: var(--jr-color); }
.no-symbol .jr-sign-symbol { display: none !important; }

.jr-sign-container.pass-blackout { border-color: #222222; }
.jr-sign-container.pass-blackout .jr-sign-symbol { background: #202020; color: #444; position: relative; }
.jr-sign-container.pass-blackout .jr-sign-symbol::after {
    content: ""; position: absolute; width: 100%; height: 2px; background: #333; transform: rotate(45deg);
}
.jr-sign-container.pass-blackout .jr-sign-jp { color: #333333; }
.jr-sign-container.pass-blackout .jr-sign-en { background: #151515; color: #333333; }

.info-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
}
.strip-item { background: #0a0a0a; border: 1px solid var(--border-flat); padding: 8px; border-radius: 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.strip-label { font-size: 10px; color: #666; font-weight: 800; margin-bottom: 2px; }
.strip-value { font-size: 16px; font-weight: 900; }

.jr-diamond-box {
    position: relative; width: 36px; height: 36px; background: #ffffff;
    border: 3px solid #000000; transform: rotate(45deg);
    display: flex; align-items: center; justify-content: center;
}
.jr-diamond-box span { transform: rotate(-45deg); font-size: 18px; font-weight: 900; color: #000000; font-family: 'Arial', sans-serif; }

.broadcast-card {
    flex: 1; background: #050505; border: 1px solid var(--border-flat); border-radius: 2px; padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
}
.broadcast-text { font-size: 14px; font-weight: 700; color: #aaaaaa; line-height: 1.5; overflow-y: auto; }

.meter-card {
    height: 68px; background: var(--bg-card); border: 1px solid var(--border-flat); border-radius: 2px;
    display: flex; align-items: center; padding: 0 16px; gap: 16px;
}
.speed-group { width: 100px; text-align: right; }
.speed-digits { font-family: 'Changa One', monospace; font-size: 38px; line-height: 1; color: #fff; }
.speed-unit { font-size: 10px; color: var(--text-muted); font-weight: 700; }
.bar-track { flex: 1; height: 18px; background: #050505; border: 1px solid #222; position: relative; overflow: hidden; }
.bar-fill { height: 100%; width: 0%; background: var(--rail-green); transition: width 0.1s linear; }
.scale-red-line { position: absolute; left: 80%; top: 0; bottom: 0; width: 2px; background: var(--rail-red); }

.bottom-actions { display: flex; flex-direction: column; gap: 4px; }
.console-log { background: #050505; border: 1px solid var(--border-flat); padding: 6px 12px; font-family: monospace; font-size: 11px; color: #666; }
.button-group { display: flex; gap: 6px; }
.btn-core.arrival { flex: 2.5; height: 60px; font-size: 18px; background: #0054a6; border-bottom: 4px solid #003366; }
.btn-core.arrival:active { background: #004488; transform: translateY(2px); border-bottom-width: 2px; }
.btn-core.skip { flex: 1; height: 60px; background: #994500; }
.btn-core.repeat { flex: 1; height: 60px; background: #222222; border: 1px solid #333; }
.btn-core {
    border: none; border-radius: 2px; font-size: 14px; font-weight: 900; cursor: pointer; color: #ffffff;
    display: flex; align-items: center; justify-content: center;
}

.modal-overlay { position: fixed; inset: 0; background: #000000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
.modal-window { width: 100%; max-width: 460px; background: var(--bg-card); border: 1px solid var(--border-flat); padding: 24px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 0 20px rgba(0,84,166,0.2); }
.modal-title { font-size: 18px; font-weight: 900; text-align: center; letter-spacing: 1px; color: #fff; border-bottom: 1px solid var(--border-flat); padding-bottom: 10px; }
.group-title { font-size: 11px; color: #00a0e9; font-weight: 900; letter-spacing: 1px; margin-bottom: -6px; }

.selector-row { display: flex; justify-content: space-around; background: #050505; padding: 6px; border: 1px solid var(--border-flat); font-size: 13px; font-weight: 700; gap: 4px; }
.selector-row label { flex: 1; text-align: center; padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; background: #111; border: 1px solid #222; }

.jr-type-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #050505; padding: 8px; border: 1px solid var(--border-flat); list-style: none; }
.jr-type-list li { position: relative; }
.jr-type-list input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
.type-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 48px; background: #141414; border: 1px solid #333333; color: #888888; font-weight: 900; font-size: 14px; cursor: pointer; transition: all 0.15s ease; }
.type-tile .tile-en { font-size: 7.5px; font-family: sans-serif; font-weight: 700; margin-top: 2px; opacity: 0.6; }
.type-tile:hover { background: #1c1c1c; color: #bbb; }

input[value="各駅停車"]:checked + .type-tile { background: var(--color-local); color: #fff; border-color: #fff; }
input[value="区間快速"]:checked + .type-tile { background: var(--color-semi-rapid); color: #fff; border-color: #fff; }
input[value="快速"]:checked + .type-tile { background: var(--color-rapid); color: #fff; border-color: #fff; }
input[value="通勤快速"]:checked + .type-tile { background: var(--color-commuter-rapid); color: #fff; border-color: #fff; }
input[value="新快速"]:checked + .type-tile { background: var(--color-new-rapid); color: #fff; border-color: #fff; }
input[value="特急"]:checked + .type-tile { background: var(--color-ltd-exp); color: #fff; border-color: #fff; }
input[value="特別快速"]:checked + .type-tile{background: var(--color-special-rapid);color:#fff;border-color:#fff;
}
.upload-label { background: #1a1a1a; border: 1px solid #333; text-align: center; padding: 12px; font-weight: 700; cursor: pointer; display: block; font-size: 13px; }
.btn-trigger { background: var(--rail-green); color: #000; padding: 12px; font-size: 15px; font-weight: 900; border: none; cursor: pointer; width: 100%; text-align: center; }

@media (max-width: 768px) {
    html, body { overflow-y: auto; }
    .app-wrapper { height: auto; gap: 4px; }
    .top-bar { flex-direction: column; height: auto; padding: 6px; gap: 4px; }
    .main-grid { flex-direction: column; height: auto; }
    .staf-panel, .control-panel { width: 100%; }
    .staf-tbody { max-height: 260px; }
    .button-group { flex-direction: column; }
    .btn-core { height: 50px; width: 100%; }
}
 /* ==========================================
   スマホ完全対応
========================================== */
/* --- iPhone向け最適化コード --- */
/* --- iPhone向け最適化（列の重なりを解消） --- */
/* ==========================
   Smartphone STAF Layout
   ========================== */
/* ==========================
   スマホ専用 STAF
   ========================== */
@media (max-width:768px){

  .staf-container{
      width:100%;
      overflow:hidden;
  }

  /* ヘッダー */
  .staf-thead{
      display:grid;
      grid-template-columns:
      52px   /* 種別 */
      48px   /* 状態 */
      1fr    /* 駅名 */
      72px   /* 予定 */
      72px   /* 実績 */
      62px;  /* 誤差 */

      font-size:11px;
      font-weight:700;
      text-align:center;
  }

  /* 各行 */
  .staf-row{
      display:grid;
      grid-template-columns:
      52px
      48px
      1fr
      72px
      72px
      62px;

      min-height:42px;
      align-items:center;
      font-size:12px;
  }

  /* 種別バッジ */
  .train-type-badge{
      display:inline-block;
      width:48px;
      padding:2px 0;

      border-radius:6px;

      color:#fff;
      font-size:10px;
      font-weight:700;

      text-align:center;
      white-space:nowrap;
  }

  /* 駅名 */
  .station-name{
      text-align:left;
      padding-left:4px;
      font-weight:600;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
  }

  /* 時刻 */
  .time-cell{
      font-size:11px;
      text-align:center;
      font-family:monospace;
  }

  /* 状態 */
  .status-stop{
      color:#2ecc71;
      font-weight:700;
  }

  .status-pass{
      color:#f39c12;
      font-weight:700;
  }

  .status-opstop{
      color:#3498db;
      font-weight:700;
  }

  /* 誤差 */
.delay-late::before{
    content:"▲";
}

.delay-early::before{
    content:"▼";
}
    
  .delay-late{
      color:#ff4d4d;
      font-weight:700;
  }

  .delay-early{
      color:#4da6ff;
      font-weight:700;
  }

  .delay-ontime{
      color:#00cc66;
      font-weight:700;
  }

  .delay-none{
      color:#888;
  }

}

</style>
</head>
<body>

<div class="app-wrapper">
    <div class="top-bar">
        <div class="train-meta">
            <span class="status-badge">支援システム稼働</span>
            <div class="train-id" id="uiTrainId">------</div>
        </div>
        <div class="system-title">MONITOR INTEGRATED SYSTEM</div>
        <div class="live-clock" id="liveClock">00:00:00</div>
    </div>

    <div class="main-grid">
        <div class="staf-panel">
            <div class="staf-thead">
                <div>種別</div><div>状態</div><div>駅名</div><div>着時刻</div><div>発時刻</div><div>実績</div><div>早晩</div>
            </div>
            <div class="staf-tbody" id="stafRowsContainer"></div>
        </div>

        <div class="control-panel">
            <div class="next-target-card">
                <span class="card-label" id="uiNextLabel">▼ NEXT STATION</span>
                <div class="target-row">
                    <div class="target-station-display" id="uiNextStation">--</div>
                    <div id="uiNextBadgeSlot"></div>
                </div>
                
                <div class="info-strip">
                    <div class="strip-item">
                        <span class="strip-label">計画最高速度</span>
                        <span class="strip-value" id="uiTargetSpeed">--</span>
                    </div>
                    <div class="strip-item">
                        <span class="strip-label">停止目標(両数)</span>
                        <div id="uiStopMarkerSlot"></div>
                    </div>
                    <div class="strip-item">
                        <span class="strip-label">開扉出口</span>
                        <span class="strip-value" id="uiDoorSide" style="color:var(--rail-yellow)">--</span>
                    </div>
                </div>
            </div>

            <div class="broadcast-card">
                <span class="card-label" style="color: #0054a6">▼ INFORMATION</span>
                <div class="broadcast-text" id="uiBroadcastText">CSVデータを読み込むと、ここに案内テキストが展開されます。</div>
            </div>

            <div class="meter-card">
                <div class="speed-group">
                    <div class="speed-digits" id="uiSpeedDigit">0</div>
                    <div class="speed-unit">km/h</div>
                </div>
                <div class="bar-track">
                    <div class="scale-red-line"></div>
                    <div class="bar-fill" id="uiSpeedBar"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-actions">
        <div class="console-log" id="uiLogText">SYSTEM ACTIVE / READY</div>
        <div class="button-group">
            <button class="btn-core repeat" id="btnRepeat">直近放送リピート</button>
            <button class="btn-core skip" id="btnSkip">当駅通過</button>
            <button class="btn-core arrival" id="btnArrival">到着 / 進捗更新</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="initModal">
    <div class="modal-window">
        <div class="modal-title">運行条件設定</div>
        
        <div class="group-title">1. 文字コード</div>
        <div class="selector-row">
            <label><input type="radio" name="enc" value="utf-8" checked> UTF-8</label>
            <label><input type="radio" name="enc" value="shift-jis"> Shift_JIS</label>
        </div>

        <div class="group-title">2. 列車種別選択（インパネ直感型）</div>
        <ul class="jr-type-list">
            <li>
                <input type="radio" name="typ" value="各駅停車" id="t-local" checked>
                <label for="t-local" class="type-tile"><div>各駅停車</div><div class="tile-en">Local Service</div></label>
            </li>
            <li>
                <input type="radio" name="typ" value="特別快速" id="t-special">
                <label for="t-special" class="type-tile"><div>特別快速</div><div class="tile-en">Special Rapid</div></label>
            </li>
            <li>
                <input type="radio" name="typ" value="快速" id="t-rapid">
                <label for="t-rapid" class="type-tile"><div>快速</div><div class="tile-en">Rapid Service</div></label>
            </li>
            <li>
                <input type="radio" name="typ" value="通勤快速" id="t-commuter">
                <label for="t-commuter" class="type-tile"><div>通勤快速</div><div class="tile-en">Commuter Rapie</div></label>
            </li>
            <li>
                <input type="radio" name="typ" value="新快速" id="t-new">
                <label for="t-new" class="type-tile"><div>新快速</div><div class="tile-en">New Rapid</div></label>
            </li>
            <li>
                <input type="radio" name="typ" value="特急" id="t-express">
                <label for="t-express" class="type-tile"><div>特急</div><div class="tile-en">Limited Exp.</div></label>
            </li>
        </ul>

        <div class="group-title">3. 組成両数</div>
        <div class="selector-row">
            <label><input type="radio" name="cars" value="3"> 3両</label>
            <label><input type="radio" name="cars" value="6"> 6両</label>
            <label><input type="radio" name="cars" value="10" checked> 10両</label>
            <label><input type="radio" name="cars" value="15"> 15両</label>
        </div>

        <div class="group-title">4. スタフ作成</div>
        <label class="upload-label">
            CSVファイルを導入してください
            <input type="file" id="inputCsv" accept=".csv" hidden>
        </label>
        
        <button class="btn-trigger" id="btnBoot" style="display:none;">システム起動</button>
    </div>
</div>

<script>
let timetable = [];
let currentIndex = 0;

// 駅ごとの接近警告状態を個別に管理するフラグ
let warned2000 = false; 
let warned400 = false;  

let routeFinished = false;
let systemStartTime = null;
let currentCoords = { lat: 0, lon: 0 };
let speechVoices = [];
let webAudioCtx = null;
let rawCsvContent = "";

let globalCarCount = "8";
let globalTrainType = "各駅停車";

function writeLog(msg) {
    document.getElementById("uiLogText").textContent = `[LOG] ${msg}`;
}

function loadVoices() {
    if (!("speechSynthesis" in window)) return;
    speechVoices = window.speechSynthesis.getVoices();
}
loadVoices();
if ("speechSynthesis" in window) { window.speechSynthesis.onvoiceschanged = loadVoices; }

setInterval(() => {
    const d = new Date();
    document.getElementById("liveClock").textContent = 
        `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
}, 250);

document.getElementById("inputCsv").addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    const encoding = document.querySelector('input[name="enc"]:checked').value;
    const reader = new FileReader();
    reader.onload = evt => {
        rawCsvContent = new TextDecoder(encoding).decode(new Uint8Array(evt.target.result));
        document.getElementById("btnBoot").style.display = "block";
        writeLog("タイムテーブルデータ取得成功。");
    };
    reader.readAsArrayBuffer(f);
});

document.getElementById("btnBoot").addEventListener("click", () => {
    globalCarCount = document.querySelector('input[name="cars"]:checked').value;
    globalTrainType = document.querySelector('input[name="typ"]:checked').value;
    
    let typeSign = "A";
    if (globalTrainType === "特急") typeSign = "L";
    else if (globalTrainType === "新快速") typeSign = "W";
    else if (globalTrainType === "快速" || globalTrainType === "通勤快速") typeSign = "M";
    
    document.getElementById("uiTrainId").textContent = `${typeSign}0125 (${globalCarCount}両編成)`;
    document.getElementById("initModal").style.display = "none";

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    webAudioCtx = new AudioContext();
    try { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); } catch(e){}

    systemStartTime = Date.now();
    compileTimetable(rawCsvContent);
    injectTimeCalculations();
    setupPositionWatcher();
    drawStaf();
    refreshDisplay();

    if (timetable.length > 0) { playVoiceGuidance(timetable[currentIndex]); }
});

function compileTimetable(text) {
    const lines = text.split(/\r?\n/);
    timetable = [];
    let cumulativeSec = 0;
    const speedPresets = ["90 km/h", "100 km/h", "110 km/h", "120 km/h", "130 km/h"];

    for (let i = 1; i < lines.length; i++) {
        const rowText = lines[i].trim();
        if (!rowText) continue;
        const cols = rowText.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if (cols.length < 6) continue;

        cumulativeSec += (parseInt(cols[3]) || 0) * 60 + (parseInt(cols[4]) || 0);
        const randomSpeed = speedPresets[Math.floor(Math.random() * speedPresets.length)];
        const randomDoor = Math.random() > 0.5 ? "左側" : "右側";

        let rawTypeCol = cols[5] ? cols[5].replace(/^"|"$/g, "").trim() : "";
        let isPassStation = rawTypeCol.includes("通過");

        timetable.push({
            station: cols[0].replace(/^"|"$/g, "").trim(),
            lat: parseFloat(cols[1]) || 0, lon: parseFloat(cols[2]) || 0,
            accumulatedSeconds: cumulativeSec, arrTimeStr: "", depTimeStr: "", plannedTimestamp: 0,
            type: globalTrainType, 
            isPass: isPassStation,
            rawAnnounce: cols[6] ? cols[6].replace(/^"|"$/g, "").trim() : "",
            actualTime: "", diffText: "--", diffColor: "var(--text-muted)",
            speedGoal: randomSpeed, doorSide: randomDoor, stopGoal: globalCarCount
        });
    }
}

function injectTimeCalculations() {
    timetable.forEach(item => {
        const t = new Date(systemStartTime + (item.accumulatedSeconds * 1000));
        item.plannedTimestamp = t.getTime();
        
        const pad = (num) => String(num).padStart(2, "0");
        item.arrTimeStr = `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
        
        const tDep = new Date(t.getTime() + 30000);
        item.depTimeStr = `${pad(tDep.getHours())}:${pad(tDep.getMinutes())}:${pad(tDep.getSeconds())}`;
    });
}

function makeSignDisplayHTML(typeText, isLarge = false, isPass = false) {
    let jp = typeText || "各駅停車";
    let en = "Local";
    let themeClass = "theme-local";
    let routeSymbol = "A"; 
    let noSymbolClass = "";

   if (jp.includes("新快速")) {en = "New Rapid"; themeClass = "theme-new-rapid";}
    else if (jp.includes("通勤快速")) { en = "Commuter Rapid "; themeClass = "theme-Commuter rapid"; }
    else if (jp.includes("特別快速")) { en = "Special Rapid"; themeClass = "theme-special-rapid"; }
    else if (jp.includes("快速")) { en = "Rapid Service"; themeClass = "theme-rapid"; }
    else if (jp.includes("特急")) { en = "Limited Exp"; themeClass = "theme-ltd-exp"; noSymbolClass = "no-symbol"; }
    else if (jp.includes("終着")) { jp = "当駅止"; en = "Terminal"; themeClass = "theme-terminal"; noSymbolClass = "no-symbol"; }

    let passBlackoutClass = isPass ? "pass-blackout" : "";

    return `
        <div class="jr-sign-container ${isLarge ? 'large' : 'small'} ${themeClass} ${noSymbolClass} ${passBlackoutClass}">
            <div class="jr-sign-top">
                <div class="jr-sign-symbol">${routeSymbol}</div>
                <div class="jr-sign-jp-box">
                    <div class="jr-sign-jp">${jp}</div>
                </div>
            </div>
            <div class="jr-sign-en">${en}</div>
        </div>
    `;
}

function makeDiamondHTML(num) {
    return `<div class="jr-diamond-box"><span>${num}</span></div>`;
}

function drawStaf() {
    const box = document.getElementById("stafRowsContainer");
    box.innerHTML = "";
    timetable.forEach((item, idx) => {
        const el = document.createElement("div");
        el.className = "staf-row";
        if (item.isPass) el.classList.add("is-pass-station");
        
        if (idx === currentIndex && !routeFinished) {
            el.classList.add("active");
            el.addEventListener("click", forwardProgress);
        }

        let arrDisplay = item.isPass ? "  ↓  " : item.arrTimeStr;
        let depDisplay = item.isPass ? "  ↓  " : item.depTimeStr;

        let statusBadgeHTML = item.isPass 
            ? `<div class="status-led-badge pass">通過</div>` 
            : `<div class="status-led-badge stop">停車</div>`;

        el.innerHTML = `
            <div>${makeSignDisplayHTML(item.type, false, item.isPass)}</div>
            <div>${statusBadgeHTML}</div>
            <div class="staf-station-name">${item.station}</div>
            <div class="staf-time-cell">${arrDisplay}</div>
            <div class="staf-time-cell">${depDisplay}</div>
            <div class="staf-actual-cell">${item.actualTime || "--:--:--"}</div>
            <div class="staf-diff-cell" style="color:${item.diffColor}">${item.diffText}</div>
        `;
        box.appendChild(el);
    });
    const activeRow = box.querySelector(".active");
    if (activeRow) activeRow.scrollIntoView({ behavior: "smooth", block: "center" });
}

function refreshDisplay() {
    const slotBadge = document.getElementById("uiNextBadgeSlot");
    const labelEl = document.getElementById("uiNextLabel");
    
    if (routeFinished || currentIndex >= timetable.length) {
        document.getElementById("uiNextStation").textContent = "全行程終了";
        slotBadge.innerHTML = makeSignDisplayHTML("終着", true, false);
        document.getElementById("uiStopMarkerSlot").innerHTML = "";
        return;
    }

    const currentTarget = timetable[currentIndex];
    document.getElementById("uiNextStation").textContent = currentTarget.station;
    slotBadge.innerHTML = makeSignDisplayHTML(currentTarget.type, true, currentTarget.isPass);
    
    if (currentTarget.isPass) {
        labelEl.textContent = "▼ NEXT PASS STATION（当駅通過）";
        labelEl.style.color = "var(--rail-yellow)";
        document.getElementById("uiStopMarkerSlot").innerHTML = "<span style='font-size:11px;color:#666;'>[ 通過 ]</span>";
    } else {
        labelEl.textContent = "▼ NEXT STATION";
        labelEl.style.color = "var(--rail-green)";
        document.getElementById("uiStopMarkerSlot").innerHTML = makeDiamondHTML(currentTarget.stopGoal);
    }

    document.getElementById("uiTargetSpeed").textContent = currentTarget.speedGoal;
    document.getElementById("uiDoorSide").textContent = currentTarget.isPass ? "--" : currentTarget.doorSide;
}

    let currentUtterances = []; // 再生中の音声インスタンスを管理
function playVoiceGuidance(target) {

    // ===== 伊那路放送用 読み上げ補正 =====

// 駅名
text = text.replace(/新しろ/g, "新城");
text = text.replace(/号しゃ/g, "号車");
text = text.replace(/とまります/g, "停まります");
// 日本語列車名
text = text
.replace(/伊那路1号/g,"いなじいちごう")
.replace(/伊那路2号/g,"いなじにごう")
.replace(/伊那路3号/g,"いなじさんごう")
.replace(/伊那路4号/g,"いなじよんごう");

// 日本語号車
text = text
.replace(/1号車/g,"いちごうしゃ")
.replace(/2号車/g,"にごうしゃ")
.replace(/3号車/g,"さんごうしゃ")
.replace(/4号車/g,"よんごうしゃ")
.replace(/5号車/g,"ごごうしゃ")
.replace(/6号車/g,"ろくごうしゃ");

// 英語 Number
text = text
.replace(/number\s*[１1]/gi,"number one")
.replace(/number\s*[２2]/gi,"number two")
.replace(/number\s*[３3]/gi,"number three")
.replace(/number\s*[４4]/gi,"number four")
.replace(/number\s*[５5]/gi,"number five")
.replace(/number\s*[６6]/gi,"number six");

// 英語 Car
text = text
.replace(/car\s*[１1]/gi,"car one")
.replace(/car\s*[２2]/gi,"car two")
.replace(/car\s*[３3]/gi,"car three")
.replace(/car\s*[４4]/gi,"car four")
.replace(/car\s*[５5]/gi,"car five")
.replace(/car\s*[６6]/gi,"car six");

// toilets car 1 → toilets car one
text = text
.replace(/toilets?\s+car\s*[１1]/gi,"toilets car one")
.replace(/toilets?\s+car\s*[２2]/gi,"toilets car two")
.replace(/toilets?\s+car\s*[３3]/gi,"toilets car three");
    if (!target || routeFinished) return;
    
    let text = target.rawAnnounce.replace(/JR/g, "ジェイアール");
    
    if (target.isPass) {
        text = `まもなく、${target.station}を通過します。`;
    } else {
        text = (target.doorSide === "左側") 
            ? text.replace(/右側/g, "左側").replace(/right side/g, "left side")
            : text.replace(/左側/g, "右側").replace(/left side/g, "right side");
    }

    document.getElementById("uiBroadcastText").innerText = text;

    if (!("speechSynthesis" in window)) return;
    try { window.speechSynthesis.cancel(); } catch(e){}

    const segments = text.split(/([^\x00-\x7F]+[\s、。]*)/g).filter(p => p.trim() !== "");

    segments.forEach(p => {
        let cleanText = p.trim();
        if (!cleanText) return;

        const ut = new SpeechSynthesisUtterance(cleanText);
        
        if (/[^\x00-\x7F]/.test(cleanText)) {
            ut.lang = "ja-JP"; 
            ut.rate = 1.05; 
            ut.pitch = 1.0;
            const jv = speechVoices.find(v => v.lang.includes("ja") && !v.name.includes("Google"));
            if (jv) ut.voice = jv;
        } else {
            ut.lang = "en-US"; 
            ut.rate = 0.90;  
            ut.pitch = 1.05; 
            
            let ev = speechVoices.find(v => v.lang.startsWith("en") && v.name.includes("Natural")) || 
                     speechVoices.find(v => v.lang.startsWith("en") && v.name.includes("Samantha")) || 
                     speechVoices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("google")) || 
                     speechVoices.find(v => v.lang.startsWith("en")); 
            if (ev) ut.voice = ev;
        }
        
        window.speechSynthesis.speak(ut);
    });

    
}


function forwardProgress() {
    if (routeFinished || timetable.length === 0 || currentIndex >= timetable.length) return;
    clickSound();

    const currentTarget = timetable[currentIndex];
    const now = new Date();
    
    currentTarget.actualTime = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

    const diff = Math.round((now.getTime() - currentTarget.plannedTimestamp) / 1000);
    if (Math.abs(diff) <= 5) {
        currentTarget.diffText = "定時"; currentTarget.diffColor = "var(--rail-green)";
    } else if (diff > 0) {
        currentTarget.diffText = `延着 ${Math.floor(diff/60) > 0 ? Math.floor(diff/60)+'分' : ''}${diff%60}秒`; currentTarget.diffColor = "var(--rail-red)";
    } else {
        const absSec = Math.abs(diff);
        currentTarget.diffText = `早着 ${Math.floor(absSec/60) > 0 ? Math.floor(absSec/60)+'分' : ''}${absSec%60}秒`; currentTarget.diffColor = "var(--rail-green)";
    }

    if (currentIndex === timetable.length - 1) {
        routeFinished = true;
        drawStaf(); refreshDisplay();
        document.getElementById("uiBroadcastText").innerText = "全行程の乗務運転作業が終了しました。";
        return;
    }

    currentIndex++;
    
    // 次の駅に進むため、接近警告用フラグをクリア
    warned2000 = false;
    warned400 = false;
    
    drawStaf(); refreshDisplay();
    if (currentIndex < timetable.length) { playVoiceGuidance(timetable[currentIndex]); }
}

function setupPositionWatcher() {
    if (!navigator.geolocation) { speedSimulation(65); return; }
    navigator.geolocation.watchPosition(pos => {
        if (routeFinished || currentIndex >= timetable.length) return;
        currentCoords.lat = pos.coords.latitude; currentCoords.lon = pos.coords.longitude;
        let kmh = Math.round((pos.coords.speed || 0) * 3.6);
        speedSimulation(kmh < 0 ? 0 : kmh);

        const target = timetable[currentIndex];
        if (target.lat === 0 && target.lon === 0) return;
        
        const dist = getDistance(currentCoords.lat, currentCoords.lon, target.lat, target.lon);
        
        // 【新機能】目的地の2.0km手前に来た時の警告処理
        if (dist <= 2.0 && dist > 0.4 && !warned2000) {
            warned2000 = true;
            beepAlert(1200, 0.15); // 少し低めの予告チャイム
            writeLog(`[ATS] 目的地2km手前接近: ${target.station}`);
        }
        
        // 目的地の400m(0.4km)手前に来た時の警告 ＆ 自動アナウンス
        if (dist <= 0.4 && !warned400) { 
            warned400 = true;
            beepAlert(2000, 0.1); // 高めの直前チャイム
            writeLog(`[ATS] 目的地400m手前直前: ${target.station}`);
            playVoiceGuidance(target);
        }
    }, () => {}, { enableHighAccuracy: true });
}

function speedSimulation(v) {
    document.getElementById("uiSpeedDigit").textContent = v;
    let pct = Math.min((v / 130) * 100, 100);
    const bar = document.getElementById("uiSpeedBar");
    bar.style.width = `${pct}%`;
    bar.style.background = v > 105 ? "var(--rail-red)" : "var(--rail-green)";
}

function clickSound() {
    if (!webAudioCtx) return;
    const ctx = webAudioCtx; const now = ctx.currentTime;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.frequency.setValueAtTime(1600, now); gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.04);
}

function beepAlert(f, vol) {
    if (!webAudioCtx) return;
    const ctx = webAudioCtx; const now = ctx.currentTime;
    [0, 0.1].forEach(d => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.frequency.setValueAtTime(f, now + d); gain.gain.setValueAtTime(vol, now + d);
        gain.gain.exponentialRampToValueAtTime(0.01, now + d + 0.05);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + d); osc.stop(now + d + 0.05);
    });
}

document.getElementById("btnArrival").addEventListener("click", forwardProgress);
document.getElementById("btnSkip").addEventListener("click", forwardProgress);
document.getElementById("btnRepeat").addEventListener("click", () => {
    clickSound();
    if (!routeFinished && timetable.length > 0) { playVoiceGuidance(timetable[currentIndex]); }
});

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

 function formatTime(date){
    return date.toLocaleTimeString(
        "ja-JP",
        {
            hour12:false,
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        }
    );
}

    function formatDelay(sec){
    const sign = sec >= 0 ? "+" : "-";
    const abs = Math.abs(sec);

    const m = Math.floor(abs / 60);
    const s = abs % 60;

    return `${sign}${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
    
</script>
